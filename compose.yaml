services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: haina_bian
      POSTGRES_USER: haina_bian
      POSTGRES_PASSWORD: haina_bian
    ports:
      - "5432:5432"
    volumes:
      - haina_bian_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haina_bian -d haina_bian"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  haina_bian_postgres:
