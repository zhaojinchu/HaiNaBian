name: hainabian

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - database
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  migrate:
    build:
      context: .
      target: migrator
    profiles:
      - tools
    env_file:
      - ${ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - database
      - edge

  app:
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?NEXT_PUBLIC_SITE_URL is required}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env.production}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - database
      - edge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres_data:

networks:
  database:
    internal: true
  edge:
